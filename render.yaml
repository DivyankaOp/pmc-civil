services:
  - type: web
    name: pmc-civil-ai-agent
    runtime: docker         # FIXED: Docker runtime for apt/Python support
    plan: starter
    autoDeploy: true
    envVars:
      - key: CLAUDE_API_KEY
        sync: false        # set this in the Render dashboard
      - key: NODE_ENV
        value: production
    healthCheckPath: /health
